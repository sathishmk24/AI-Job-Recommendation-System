{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

```
<div class="col-md-8">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h2>Edit Job</h2>
        </div>

        <div class="card-body">

            <form action="/update-job/{{ job[0] }}" method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Job Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        value="{{ job[1] }}"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Skills
                    </label>

                    <input
                        type="text"
                        name="skills"
                        value="{{ job[2] }}"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">
                    Update Job
                </button>

                <a
                    href="/admin"
                    class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
