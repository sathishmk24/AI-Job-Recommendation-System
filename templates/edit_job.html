<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Edit Job</h2>

    <form action="/update-job/{{ job[0] }}" method="POST">

        <div class="mb-3">
            <label class="form-label">Job Title</label>

            <input
                type="text"
                name="title"
                value="{{ job[1] }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Skills</label>

            <input
                type="text"
                name="skills"
                value="{{ job[2] }}"
                class="form-control"
                required>
        </div>

        <button class="btn btn-primary">
            Update Job
        </button>

    </form>

</div>

</body>
</html>
