{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card p-4">

            <h2 class="text-center mb-4">
                Upload Resume
            </h2>

            <form action="/recommend"
                  method="POST"
                  enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Select Resume (PDF)
                    </label>

                    <input type="file"
                           name="resume"
                           accept=".pdf"
                           class="form-control"
                           required>

                </div>

                <div class="d-grid">

                    <button type="submit"
                            class="btn btn-primary">

                        Get Recommendations

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
