<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Upload Resume</h1>

    <form action="/recommend"
          method="POST"
          enctype="multipart/form-data">

        <input type="file"
               name="resume"
               accept=".pdf"
               required>

        <br><br>

        <button type="submit">
            Get Recommendations
        </button>

    </form>

</div>

</body>
</html>
