{% extends "base.html" %}

{% block content %}

<div class="card shadow">

```
<div class="card-header bg-primary text-white">
    <h2>Admin Dashboard</h2>
</div>

<div class="card-body">

    <h4 class="mb-3">Add New Job</h4>

    <form action="/add-job" method="POST">

        <div class="mb-3">
            <label class="form-label">Job Title</label>

            <input
                type="text"
                name="title"
                class="form-control"
                placeholder="Enter Job Title"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Skills</label>

            <input
                type="text"
                name="skills"
                class="form-control"
                placeholder="python flask sql"
                required>
        </div>

        <button
            type="submit"
            class="btn btn-success">
            Add Job
        </button>

    </form>

</div>
```

</div>

<div class="card shadow mt-4">

```
<div class="card-header bg-dark text-white">
    <h4>Available Jobs</h4>
</div>

<div class="card-body">

    <table class="table table-bordered table-striped">

        <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Job Title</th>
                <th>Skills</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            {% for job in jobs %}

            <tr>

                <td>{{ job[0] }}</td>
                <td>{{ job[1] }}</td>
                <td>{{ job[2] }}</td>

                <td>

                    <a
                        href="/edit-job/{{ job[0] }}"
                        class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a
                        href="/delete-job/{{ job[0] }}"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Delete this job?')">
                        Delete
                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>
```

</div>

{% endblock %}
